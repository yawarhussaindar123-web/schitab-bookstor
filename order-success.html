<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Placed — Schitab</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FBF9F4; --white: #FFFFFF; --navy: #1B2A4A; --navy-light: #2E4270;
    --gold: #C9A227; --gold-soft: #F4E8C1; --text-muted: #6B7280; --border: #E8E4DA;
    --green: #1F7A4D; --green-soft: #E3F0E8;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'DM Sans',sans-serif; background:var(--cream); color:var(--navy); font-weight:500; -webkit-font-smoothing:antialiased; min-height:100vh; display:flex; flex-direction:column; }
  a { text-decoration:none; color:inherit; }

  header { background:var(--white); border-bottom:1px solid var(--border); }
  .header-inner { max-width:1100px; margin:0 auto; padding:16px 20px; }
  .logo { font-family:'Playfair Display',serif; font-weight:800; font-size:26px; color:var(--navy); }
  .logo span { color:var(--gold); }

  main { flex:1; display:flex; align-items:center; justify-content:center; padding:30px 20px; }

  .success-card {
    background:var(--white); border:1px solid var(--border); border-radius:16px;
    padding:36px 28px; max-width:440px; width:100%; text-align:center;
  }

  .check-circle {
    width:64px; height:64px; border-radius:50%;
    background:var(--green-soft); color:var(--green);
    display:flex; align-items:center; justify-content:center;
    margin:0 auto 18px;
  }

  .success-card h1 { font-size:21px; font-weight:800; margin-bottom:6px; }
  .success-card .sub { font-size:13px; color:var(--text-muted); margin-bottom:24px; }

  .detail-box {
    background:var(--cream); border:1px solid var(--border); border-radius:12px;
    padding:18px; margin-bottom:22px; text-align:left;
  }
  .detail-row {
    display:flex; justify-content:space-between; align-items:baseline;
    font-size:13.5px; padding:7px 0;
  }
  .detail-row:not(:last-child) { border-bottom:1px solid var(--border); }
  .detail-row .label { color:var(--text-muted); font-weight:600; }
  .detail-row .value { font-weight:800; color:var(--navy); text-align:right; }
  .detail-row.total .value { font-size:18px; }

  .badge {
    display:inline-block; font-size:11px; font-weight:800;
    padding:4px 10px; border-radius:100px;
    background:var(--green-soft); color:var(--green);
    text-transform:capitalize;
  }

  .next-steps {
    text-align:left; font-size:12.5px; color:var(--text-muted);
    background:var(--gold-soft); border-radius:10px; padding:14px;
    margin-bottom:22px; line-height:1.7;
  }
  .next-steps strong { color:var(--navy); }

  .btn-row { display:flex; gap:10px; flex-wrap:wrap; }
  .btn {
    flex:1; padding:13px; border-radius:10px; border:none;
    font-size:13.5px; font-weight:800; cursor:pointer;
    transition:background 0.2s; text-align:center;
  }
  .btn-primary { background:var(--navy); color:var(--white); }
  .btn-primary:hover { background:var(--navy-light); }
  .btn-outline { background:var(--white); border:1.5px solid var(--border); color:var(--navy); }
  .btn-outline:hover { background:var(--gold-soft); }

  .empty-state { text-align:center; padding:40px 20px; }
  .empty-state h1 { font-size:19px; font-weight:800; margin-bottom:10px; }
  .empty-state p { font-size:13px; color:var(--text-muted); margin-bottom:20px; }

  footer { background:var(--navy); color:var(--white); text-align:center; padding:24px 20px; font-size:13px; opacity:0.75; }
  footer .logo-foot { font-family:'Playfair Display',serif; font-weight:700; font-size:18px; color:var(--white); margin-bottom:6px; }
  footer .logo-foot span { color:var(--gold); }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <a href="index.html" class="logo">Schi<span>tab</span></a>
  </div>
</header>

<main>
  <div class="success-card" id="successCard">
    <!-- Populated by script -->
  </div>
</main>

<footer>
  <div class="logo-foot">Schi<span>tab</span></div>
  <div>Reban, Kashmir · Order via WhatsApp</div>
</footer>

<script>
  const params = new URLSearchParams(window.location.search);
  const orderNumber = params.get('order');
  const amount = params.get('amount');
  const status = params.get('status');
  const method = params.get('method');

  const card = document.getElementById('successCard');

  if (!orderNumber) {
    // No order info in URL — show a generic "no order" state
    card.innerHTML = `
      <div class="empty-state">
        <h1>No order found</h1>
        <p>This page shows confirmation right after placing an order.<br>If you're looking for past orders, check your account.</p>
        <div class="btn-row">
          <a href="account.html" class="btn btn-primary">My Orders</a>
          <a href="index.html" class="btn btn-outline">Continue Shopping</a>
        </div>
      </div>`;
  } else {
    const statusLabel = (status || 'confirmed').replace(/_/g, ' ');
    const dispatchEstimate = (status === 'pending_payment')
      ? 'Awaiting payment confirmation'
      : '1-2 Business Days';

    card.innerHTML = `
      <div class="check-circle">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M20 6L9 17l-5-5"/>
        </svg>
      </div>
      <h1>Order Placed Successfully!</h1>
      <div class="sub">Thank you — we've received your order.</div>

      <div class="detail-box">
        <div class="detail-row">
          <span class="label">Order Number</span>
          <span class="value">${orderNumber}</span>
        </div>
        <div class="detail-row">
          <span class="label">Payment Method</span>
          <span class="value">${method || 'Cash on Delivery'}</span>
        </div>
        <div class="detail-row">
          <span class="label">Status</span>
          <span class="value"><span class="badge">${statusLabel}</span></span>
        </div>
        <div class="detail-row total">
          <span class="label">Total</span>
          <span class="value">₹${amount || '—'}</span>
        </div>
      </div>

      <div class="next-steps">
        <strong>What happens next:</strong><br>
        We'll confirm your order and start preparing it for dispatch.
        Estimated dispatch: <strong>${dispatchEstimate}</strong>.
        You can track your order anytime from "My Orders" or message us on WhatsApp.
      </div>

      <div class="btn-row">
        <a href="account.html" class="btn btn-primary">Track Order</a>
        <a href="index.html" class="btn btn-outline">Continue Shopping</a>
      </div>
    `;
  }
</script>

</body>
</html>
