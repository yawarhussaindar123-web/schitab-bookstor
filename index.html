<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schitab — Your Books, Delivered</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FBF9F4;
    --white: #FFFFFF;
    --navy: #1B2A4A;
    --navy-light: #2E4270;
    --gold: #C9A227;
    --gold-soft: #F4E8C1;
    --text-muted: #6B7280;
    --border: #E8E4DA;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--navy);
    -webkit-font-smoothing: antialiased;
  }

  /* ===== HEADER ===== */
  header {
    background: var(--white);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 50;
  }

  .header-inner {
    max-width: 1200px;
    margin: 0 auto;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-weight: 800;
    font-size: 28px;
    color: var(--navy);
    letter-spacing: -0.5px;
    white-space: nowrap;
  }

  .logo span { color: var(--gold); }

  .search-bar {
    flex: 1;
    max-width: 480px;
    display: flex;
    align-items: center;
    background: var(--cream);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 10px 18px;
  }

  .search-bar input {
    border: none;
    background: none;
    outline: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    width: 100%;
    color: var(--navy);
  }

  .search-bar svg { flex-shrink: 0; margin-right: 8px; opacity: 0.5; }

  .header-actions {
    display: flex;
    gap: 14px;
    align-items: center;
  }

  .icon-btn {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: var(--cream);
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.2s;
  }

  .icon-btn:hover { background: var(--gold-soft); }

  /* ===== HERO ===== */
  .hero {
    background: var(--navy);
    color: var(--white);
    padding: 48px 20px;
    text-align: center;
  }

  .hero h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(28px, 5vw, 44px);
    font-weight: 700;
    margin-bottom: 10px;
    line-height: 1.2;
  }

  .hero h1 .accent { color: var(--gold); }

  .hero p {
    font-size: 15px;
    opacity: 0.8;
    max-width: 480px;
    margin: 0 auto;
  }

  /* ===== CATEGORY PILLS ===== */
  .category-bar {
    max-width: 1200px;
    margin: 0 auto;
    padding: 20px 20px 4px;
    display: flex;
    gap: 10px;
    overflow-x: auto;
    scrollbar-width: none;
  }

  .category-bar::-webkit-scrollbar { display: none; }

  .pill {
    flex-shrink: 0;
    padding: 8px 18px;
    border-radius: 100px;
    background: var(--white);
    border: 1px solid var(--border);
    font-size: 13px;
    font-weight: 500;
    color: var(--navy);
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .pill.active, .pill:hover {
    background: var(--navy);
    color: var(--white);
    border-color: var(--navy);
  }

  /* ===== GRID ===== */
  .catalog {
    max-width: 1200px;
    margin: 0 auto;
    padding: 24px 20px 60px;
  }

  .catalog-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .catalog-header h2 {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 700;
  }

  .catalog-header span {
    font-size: 13px;
    color: var(--text-muted);
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 18px;
  }

  .card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transition: transform 0.2s, box-shadow 0.2s;
    position: relative;
  }

  .card:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 24px -8px rgba(27, 42, 74, 0.18);
  }

  .card-cover {
    aspect-ratio: 3 / 4;
    background: var(--gold-soft);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
    cursor: pointer;
    text-decoration: none;
  }

  .card-cover img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    pointer-events: none;
  }

  .badge {
    position: absolute;
    top: 10px;
    left: 10px;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 4px 9px;
    border-radius: 100px;
  }

  .badge.in-stock {
    background: rgba(27, 42, 74, 0.9);
    color: var(--white);
  }

  .badge.preorder {
    background: var(--gold);
    color: var(--navy);
  }

  .card-body {
    padding: 12px 14px 14px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    flex: 1;
  }

  .card-category {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--gold);
  }

  .card-title {
    font-size: 15px;
    font-weight: 700;
    line-height: 1.35;
    color: var(--navy);
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .card-author {
    font-size: 12px;
    color: var(--text-muted);
  }

  .card-price-row {
    margin-top: auto;
    padding-top: 8px;
    display: flex;
    align-items: baseline;
    gap: 6px;
  }

  .card-price {
    font-size: 18px;
    font-weight: 800;
    color: var(--navy);
  }

  .card-mrp {
    font-size: 12px;
    color: var(--text-muted);
    text-decoration: line-through;
  }

  .card-cta {
    margin-top: 10px;
    width: 100%;
    padding: 9px;
    border-radius: 8px;
    border: none;
    background: var(--navy);
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }

  .card-cta:hover { background: var(--navy-light); }

  /* ===== STATES ===== */
  .state-msg {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
    font-size: 14px;
  }

  .skeleton {
    background: linear-gradient(90deg, var(--gold-soft) 25%, var(--white) 50%, var(--gold-soft) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
  }

  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  .skeleton-card .card-cover { aspect-ratio: 3/4; }
  .skeleton-card .card-body > div {
    height: 12px;
    border-radius: 4px;
    margin-bottom: 8px;
  }

  /* ===== CART BADGE ===== */
  .cart-badge {
    position: absolute;
    top: -4px;
    right: -4px;
    background: var(--gold);
    color: var(--navy);
    font-size: 10px;
    font-weight: 700;
    min-width: 18px;
    height: 18px;
    border-radius: 100px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 4px;
    border: 2px solid var(--white);
  }

  /* ===== CART DRAWER ===== */
  .cart-overlay {
    position: fixed;
    inset: 0;
    background: rgba(27, 42, 74, 0.45);
    z-index: 100;
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.25s;
  }

  .cart-overlay.open {
    opacity: 1;
    visibility: visible;
  }

  .cart-drawer {
    position: fixed;
    top: 0;
    right: 0;
    bottom: 0;
    width: min(380px, 92vw);
    background: var(--cream);
    z-index: 101;
    display: flex;
    flex-direction: column;
    transform: translateX(100%);
    transition: transform 0.3s ease;
    box-shadow: -8px 0 24px rgba(27,42,74,0.15);
  }

  .cart-drawer.open { transform: translateX(0); }

  .cart-drawer-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--white);
  }

  .cart-drawer-header h3 {
    font-family: 'Playfair Display', serif;
    font-size: 19px;
    font-weight: 700;
  }

  .cart-close {
    background: none;
    border: none;
    font-size: 24px;
    line-height: 1;
    color: var(--navy);
    cursor: pointer;
    padding: 4px;
  }

  .cart-items {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .cart-item {
    display: flex;
    gap: 12px;
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px;
  }

  .cart-item img {
    width: 48px;
    height: 64px;
    object-fit: cover;
    border-radius: 6px;
    background: var(--gold-soft);
    flex-shrink: 0;
  }

  .cart-item-info {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 4px;
    min-width: 0;
  }

  .cart-item-title {
    font-size: 14px;
    font-weight: 700;
    color: var(--navy);
    line-height: 1.35;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .cart-item-price {
    font-size: 15px;
    font-weight: 800;
    color: var(--navy);
  }

  .cart-item-controls {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: auto;
  }

  .qty-btn {
    width: 24px;
    height: 24px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--cream);
    font-size: 14px;
    font-weight: 700;
    color: var(--navy);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .qty-val {
    font-size: 13px;
    font-weight: 600;
    min-width: 18px;
    text-align: center;
  }

  .remove-btn {
    margin-left: auto;
    font-size: 11px;
    color: var(--text-muted);
    text-decoration: underline;
    background: none;
    border: none;
    cursor: pointer;
    padding: 0;
  }

  .cart-empty {
    text-align: center;
    color: var(--text-muted);
    font-size: 14px;
    padding: 60px 20px;
  }

  .cart-footer {
    padding: 16px 20px;
    border-top: 1px solid var(--border);
    background: var(--white);
  }

  .cart-total-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-family: 'DM Sans', sans-serif;
    font-size: 21px;
    font-weight: 800;
    color: var(--navy);
    margin-bottom: 12px;
  }

  .cart-checkout-btn {
    width: 100%;
    padding: 13px;
    border-radius: 10px;
    border: none;
    background: var(--navy);
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.2s;
  }

  .cart-checkout-btn:hover { background: var(--navy-light); }
  .cart-checkout-btn:disabled {
    background: var(--border);
    color: var(--text-muted);
    cursor: not-allowed;
  }

  /* ===== FOOTER ===== */
  footer {
    background: var(--navy);
    color: var(--white);
    text-align: center;
    padding: 28px 20px;
    font-size: 13px;
    opacity: 0.75;
  }

  footer .logo-foot {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 18px;
    color: var(--white);
    margin-bottom: 6px;
  }

  footer .logo-foot span { color: var(--gold); }

  @media (max-width: 640px) {
    .header-inner { flex-wrap: wrap; }
    .search-bar { order: 3; flex: 1 1 100%; max-width: none; }
    .hero { padding: 36px 16px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">Schi<span>tab</span></div>
    <div class="search-bar">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      <input type="text" id="searchInput" placeholder="Search for books, authors, exams...">
    </div>
    <div class="header-actions">
      <div class="icon-btn" title="Wishlist">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#1B2A4A" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      </div>
      <div class="icon-btn" id="cartBtn" title="Cart" style="position:relative;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#1B2A4A" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        <span id="cartBadge" class="cart-badge" style="display:none;">0</span>
      </div>
    </div>
  </div>
</header>

<!-- ===== CART DRAWER ===== -->
<div id="cartOverlay" class="cart-overlay"></div>
<div id="cartDrawer" class="cart-drawer">
  <div class="cart-drawer-header">
    <h3>Your Cart</h3>
    <button id="cartClose" class="cart-close" aria-label="Close cart">&times;</button>
  </div>
  <div id="cartItems" class="cart-items"></div>
  <div class="cart-footer">
    <div class="cart-total-row">
      <span>Total</span>
      <span id="cartTotal">₹0</span>
    </div>
    <button class="cart-checkout-btn" id="cartProceedBtn">Proceed to Checkout</button>
    <button class="cart-checkout-btn" id="cartCheckoutBtn" style="background:var(--white);color:var(--navy);border:1.5px solid var(--navy);margin-top:8px;">Order via WhatsApp</button>
  </div>
</div>

<section class="hero">
  <h1>Books that reach you,<br>not the other way <span class="accent">around.</span></h1>
  <p>NCERT, competitive exams, and more — priced fair, delivered to your door in Kashmir.</p>
</section>

<div class="category-bar" id="categoryBar">
  <div class="pill active" data-slug="">All Books</div>
</div>

<main class="catalog">
  <div class="catalog-header">
    <h2 id="catalogTitle">All Books</h2>
    <span id="catalogCount"></span>
  </div>
  <div class="grid" id="grid"></div>
</main>

<footer>
  <div class="logo-foot">Schi<span>tab</span></div>
  <div>Reban, Kashmir · Order via WhatsApp</div>
</footer>

<script>
  const SUPABASE_URL = 'https://khhblggrzqnlcjfvwwhk.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_BfgZnaVfjyzy4xon-iD-Qw_EIpMlJzF';
  // PREVIEW MODE: real data from your database, embedded directly
  // so this works as a plain file with no internet/hosting needed.
  // Once hosted live, this will be replaced with a live fetch.
  const grid = document.getElementById('grid');
  const catalogTitle = document.getElementById('catalogTitle');
  const catalogCount = document.getElementById('catalogCount');
  const categoryBar = document.getElementById('categoryBar');
  const searchInput = document.getElementById('searchInput');

  let allBooks = [];
  let allCategories = [];
  let activeCategory = '';
  let searchTerm = '';

  function showSkeletons(n = 8) {
    grid.innerHTML = '';
    for (let i = 0; i < n; i++) {
      const card = document.createElement('div');
      card.className = 'card skeleton-card';
      card.innerHTML = `
        <div class="card-cover skeleton"></div>
        <div class="card-body">
          <div class="skeleton" style="width:40%"></div>
          <div class="skeleton" style="width:90%"></div>
          <div class="skeleton" style="width:60%"></div>
        </div>`;
      grid.appendChild(card);
    }
  }

  function renderBooks() {
    let books = allBooks;

    if (activeCategory) {
      books = books.filter(b => b.category_id === activeCategory);
    }
    if (searchTerm.trim()) {
      const t = searchTerm.trim().toLowerCase();
      books = books.filter(b =>
        b.title.toLowerCase().includes(t) ||
        (b.publisher && b.publisher.toLowerCase().includes(t))
      );
    }

    catalogCount.textContent = books.length + (books.length === 1 ? ' book' : ' books');

    if (books.length === 0) {
      grid.innerHTML = `<div class="state-msg" style="grid-column:1/-1">
        No books found here yet — try a different category or search term.
      </div>`;
      return;
    }

    grid.innerHTML = '';
    books.forEach(book => {
      const card = document.createElement('div');
      card.className = 'card';

      const badgeClass = book.availability === 'in_stock' ? 'in-stock' : 'preorder';
      const badgeText = book.availability === 'in_stock' ? 'In Stock' : 'On Order · 3-4 days';

      const coverHtml = book.cover_url
        ? `<img src="${book.cover_url}" alt="${book.title}" loading="lazy" onerror="this.parentElement.innerHTML='<span style=\\'font-family:Playfair Display,serif;font-weight:700;color:#1B2A4A;font-size:13px;text-align:center;padding:12px\\'>${book.title}</span>'">`
        : `<span style="font-family:'Playfair Display',serif;font-weight:700;color:var(--navy);font-size:13px;text-align:center;padding:12px">${book.title}</span>`;

      const mrpHtml = (book.mrp && book.mrp > book.price)
        ? `<span class="card-mrp">₹${book.mrp}</span>`
        : '';

      card.innerHTML = `
        <div class="card-cover" onclick="window.location.href='product.html?slug=${book.slug}'" style="cursor:pointer;">
          <span class="badge ${badgeClass}">${badgeText}</span>
          ${coverHtml}
        </div>
        <div class="card-body">
          <div class="card-category">${book.categories ? book.categories.name : ''}</div>
          <div class="card-title" onclick="window.location.href='product.html?slug=${book.slug}'" style="cursor:pointer;">${book.title}</div>
          <div class="card-author">${book.publisher || ''}</div>
          <div class="card-price-row">
            <span class="card-price">₹${book.price}</span>
            ${mrpHtml}
          </div>
          <button class="card-cta" data-slug="${book.slug}">Add to Cart</button>
        </div>`;
      grid.appendChild(card);
    });

    grid.querySelectorAll('.card-cta').forEach(btn => {
      btn.addEventListener('click', () => {
        addToCart(btn.dataset.slug);
        btn.textContent = 'Added ✓';
        setTimeout(() => { btn.textContent = 'Add to Cart'; }, 1000);
      });
    });
  }

  function renderCategories() {
    // Only show categories that actually have books
    const usedCategoryIds = new Set(allBooks.map(b => b.category_id));
    const usedCategories = allCategories.filter(c => usedCategoryIds.has(c.id));

    categoryBar.innerHTML = `<div class="pill active" data-id="">All Books</div>`;
    usedCategories.forEach(cat => {
      const pill = document.createElement('div');
      pill.className = 'pill';
      pill.dataset.id = cat.id;
      pill.textContent = cat.name;
      categoryBar.appendChild(pill);
    });

    categoryBar.querySelectorAll('.pill').forEach(pill => {
      pill.addEventListener('click', () => {
        categoryBar.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
        pill.classList.add('active');
        activeCategory = pill.dataset.id || '';
        catalogTitle.textContent = activeCategory ? pill.textContent : 'All Books';
        renderBooks();
      });
    });
  }

  async function loadData() {
    showSkeletons();
    try {
      // Fetch books and categories in parallel
      const [booksRes, catsRes] = await Promise.all([
        fetch(`${SUPABASE_URL}/rest/v1/books?select=*,categories(id,name)&is_active=eq.true&order=title.asc`, {
          headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
        }),
        fetch(`${SUPABASE_URL}/rest/v1/categories?select=id,name&order=name.asc`, {
          headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
        })
      ]);

      if (!booksRes.ok) throw new Error('Could not load books (status ' + booksRes.status + ')');
      if (!catsRes.ok) throw new Error('Could not load categories (status ' + catsRes.status + ')');

      allBooks = await booksRes.json();
      allCategories = await catsRes.json();

    } catch (err) {
      grid.innerHTML = `<div class="state-msg" style="grid-column:1/-1;color:#b91c1c;">
        Could not load books right now. Please refresh and try again.<br>
        <small style="color:#888">${err.message}</small>
      </div>`;
      return;
    }

    renderCategories();
    renderBooks();
  }

  searchInput.addEventListener('input', (e) => {
    searchTerm = e.target.value;
    renderBooks();
  });

  // ===== CART LOGIC =====
  // Cart persists in localStorage so it survives page refreshes/navigation
  // even as a local file. If the user is logged in (session from login.html),
  // the cart also syncs to the cart_items table in Supabase for
  // cross-device persistence.
  const REST_URL = SUPABASE_URL + '/rest/v1';

  function getSession() {
    try {
      const raw = localStorage.getItem('schitab_session');
      return raw ? JSON.parse(raw) : null;
    } catch { return null; }
  }

  function authHeaders() {
    const session = getSession();
    return {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + (session?.access_token || SUPABASE_KEY),
      'Content-Type': 'application/json'
    };
  }

  function loadLocalCart() {
    try {
      const raw = localStorage.getItem('schitab_cart');
      return raw ? JSON.parse(raw) : [];
    } catch { return []; }
  }

  function saveLocalCart() {
    localStorage.setItem('schitab_cart', JSON.stringify(cart));
  }

  let cart = loadLocalCart(); // [{ slug, qty }]

  const cartBtn = document.getElementById('cartBtn');
  const cartBadge = document.getElementById('cartBadge');
  const cartOverlay = document.getElementById('cartOverlay');
  const cartDrawer = document.getElementById('cartDrawer');
  const cartClose = document.getElementById('cartClose');
  const cartItemsEl = document.getElementById('cartItems');
  const cartTotalEl = document.getElementById('cartTotal');
  const cartCheckoutBtn = document.getElementById('cartCheckoutBtn');

  function findBook(slug) {
    return allBooks.find(b => b.slug === slug);
  }

  // --- Supabase sync for logged-in users (best-effort, fails silently if offline/unhosted) ---
  async function syncCartToServer(slug, qty) {
    const session = getSession();
    if (!session?.user?.id) return; // guest — localStorage only

    try {
      const bookRes = await fetch(`${REST_URL}/books?slug=eq.${slug}&select=id`, { headers: authHeaders() });
      const books = await bookRes.json();
      if (!books?.[0]?.id) return;
      const bookId = books[0].id;

      if (qty <= 0) {
        await fetch(`${REST_URL}/cart_items?user_id=eq.${session.user.id}&book_id=eq.${bookId}`, {
          method: 'DELETE',
          headers: authHeaders()
        });
      } else {
        await fetch(`${REST_URL}/cart_items?on_conflict=user_id,book_id`, {
          method: 'POST',
          headers: { ...authHeaders(), 'Prefer': 'resolution=merge-duplicates' },
          body: JSON.stringify({ user_id: session.user.id, book_id: bookId, quantity: qty })
        });
      }
    } catch (err) {
      console.warn('Cart sync skipped (offline or not hosted yet):', err.message);
    }
  }

  function addToCart(slug) {
    const existing = cart.find(i => i.slug === slug);
    if (existing) {
      existing.qty += 1;
    } else {
      cart.push({ slug, qty: 1 });
    }
    saveLocalCart();
    const item = cart.find(i => i.slug === slug);
    syncCartToServer(slug, item.qty);
    renderCart();
  }

  function changeQty(slug, delta) {
    const item = cart.find(i => i.slug === slug);
    if (!item) return;
    item.qty += delta;
    if (item.qty <= 0) {
      cart = cart.filter(i => i.slug !== slug);
      syncCartToServer(slug, 0);
    } else {
      syncCartToServer(slug, item.qty);
    }
    saveLocalCart();
    renderCart();
  }

  function removeFromCart(slug) {
    cart = cart.filter(i => i.slug !== slug);
    saveLocalCart();
    syncCartToServer(slug, 0);
    renderCart();
  }

  function renderCart() {
    const totalItems = cart.reduce((sum, i) => sum + i.qty, 0);
    cartBadge.textContent = totalItems;
    cartBadge.style.display = totalItems > 0 ? 'flex' : 'none';

    if (cart.length === 0) {
      cartItemsEl.innerHTML = `<div class="cart-empty">Your cart is empty.<br>Add some books to get started.</div>`;
      cartTotalEl.textContent = '₹0';
      cartCheckoutBtn.disabled = true;
      return;
    }

    cartCheckoutBtn.disabled = false;
    let total = 0;
    cartItemsEl.innerHTML = '';

    cart.forEach(item => {
      const book = findBook(item.slug);
      if (!book) return;
      const lineTotal = book.price * item.qty;
      total += lineTotal;

      const coverSrc = book.cover_url || '';
      const el = document.createElement('div');
      el.className = 'cart-item';
      el.innerHTML = `
        ${coverSrc ? `<img src="${coverSrc}" alt="${book.title}">` : `<div style="width:48px;height:64px;border-radius:6px;background:var(--gold-soft);flex-shrink:0;"></div>`}
        <div class="cart-item-info">
          <div class="cart-item-title">${book.title}</div>
          <div class="cart-item-price">₹${lineTotal}</div>
          <div class="cart-item-controls">
            <button class="qty-btn" data-action="dec" data-slug="${book.slug}">−</button>
            <span class="qty-val">${item.qty}</span>
            <button class="qty-btn" data-action="inc" data-slug="${book.slug}">+</button>
            <button class="remove-btn" data-slug="${book.slug}">Remove</button>
          </div>
        </div>`;
      cartItemsEl.appendChild(el);
    });

    cartTotalEl.textContent = '₹' + total;

    cartItemsEl.querySelectorAll('.qty-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const delta = btn.dataset.action === 'inc' ? 1 : -1;
        changeQty(btn.dataset.slug, delta);
      });
    });
    cartItemsEl.querySelectorAll('.remove-btn').forEach(btn => {
      btn.addEventListener('click', () => removeFromCart(btn.dataset.slug));
    });
  }

  function openCart() {
    cartOverlay.classList.add('open');
    cartDrawer.classList.add('open');
  }
  function closeCart() {
    cartOverlay.classList.remove('open');
    cartDrawer.classList.remove('open');
  }

  cartBtn.addEventListener('click', openCart);
  cartClose.addEventListener('click', closeCart);
  cartOverlay.addEventListener('click', closeCart);

  document.getElementById('cartProceedBtn').addEventListener('click', () => {
    if (cart.length === 0) return;
    closeCart();
    window.location.href = 'checkout.html';
  });

  cartCheckoutBtn.addEventListener('click', () => {
    if (cart.length === 0) return;
    let message = "Hi Schitab! I'd like to order:\n\n";
    let total = 0;
    cart.forEach(item => {
      const book = findBook(item.slug);
      if (!book) return;
      const lineTotal = book.price * item.qty;
      total += lineTotal;
      message += `• ${book.title} x${item.qty} — ₹${lineTotal}\n`;
    });
    message += `\nTotal: ₹${total}`;
    const encoded = encodeURIComponent(message);
    // Replace with your real WhatsApp business number (country code, no +/spaces)
    const WHATSAPP_NUMBER = '916006839411';
    window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encoded}`, '_blank');
  });

  renderCart();
  loadData().then(() => renderCart());
</script>

</body>
</html>
